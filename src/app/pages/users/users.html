@if (isLoading()) {
  <div class="card">
    <p-table  [loading]="true" [tableStyle]="{ 'min-width': '50rem' }" >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 25%">ID</th>
          <th style="width: 25%">Username</th>
          <th style="width: 25%">Email</th>
          <th style="width: 25%">Phone Number</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-product>
        <tr>
          <td>{{ product.id }}</td>
          <td>{{ product.username }}</td>
          <td>{{ product.email }}</td>
          <td>{{ product.phone }}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
} @else {
  @if (userDummyData) {
    <div class="card">
      <p-table
        [value]="userDummyData"
       
       [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '50rem' }" [rowsPerPageOptions]="[5, 10, 20]"
        [loading]="false"
      >
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 25%">ID</th>
            <th style="width: 25%">User Name</th>
            <th style="width: 25%">Email</th>
            <th style="width: 25%">Phone Number</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-product>
          <tr>
            <td>{{ product.id }}</td>
            <td>{{ product.username }}</td>
            <td>{{ product.email }}</td>
            <td>{{ product.phone }}</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  }
}
