    <p-card class="h-full" >
      <div class="flex justify-content-between align-items-center">
        <div>
          <div class=".p-card-title">{{title}}</div>
          <div class="text-3xl font-bold mt-2 .p-card-subtitle">{{value}}</div>
        </div>
       @if (title.toLocaleLowerCase() === 'total users') {
        <i class="pi pi-users text-4xl text-primary"></i>
      } @else if (title.toLocaleLowerCase() === 'active users') {
        <i class="pi pi-check-circle text-4xl text-green-500"></i>
      } @else if (title.toLocaleLowerCase() === 'api users') {
        <i class="pi pi-arrow-circle-down text-4xl text-green-500"></i>
      } @else {
        <i class="pi pi-user-plus text-4xl text-blue-500"></i>
      }
      </div>
    </p-card>
